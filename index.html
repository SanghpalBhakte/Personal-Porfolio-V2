    <!-- Load the stylesheet asynchronously so it doesn't block First Paint -->

    <noscript>

    </noscript>

    <!-- Theme Initializer: prevents flash of wrong theme on load -->
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var sysTheme = window.matchMedia('(prefers-color-scheme: light)').matches;
          if (localTheme === 'light' || (!localTheme && sysTheme)) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
